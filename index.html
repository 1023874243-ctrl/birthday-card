<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍮 生日快乐！🍪</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(160deg, #fff9e6 0%, #fff3cd 30%, #ffe8a1 60%, #fef0c8 100%);
    font-family: 'Georgia', 'Noto Serif SC', serif;
    overflow-x: hidden;
    overflow-y: auto;
    padding: 20px;
    position: relative;
  }

  /* === 背景浮动元素 === */
  .bg-pattern {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .bg-float {
    position: absolute;
    animation: floatAround var(--dur) ease-in-out infinite;
    animation-delay: var(--delay);
    opacity: 0.35;
    font-size: var(--size);
    filter: blur(0.5px);
  }
  @keyframes floatAround {
    0%, 100% { transform: translateY(0) translateX(0) rotate(0deg); }
    25% { transform: translateY(-20px) translateX(15px) rotate(5deg); }
    50% { transform: translateY(-5px) translateX(-10px) rotate(-3deg); }
    75% { transform: translateY(-25px) translateX(5px) rotate(4deg); }
  }

  /* === 主卡片 === */
  .card-container {
    position: relative;
    z-index: 1;
    perspective: 1200px;
    width: 100%;
    display: flex;
    justify-content: center;
  }

  .card {
    width: 440px;
    max-width: 92vw;
    background: linear-gradient(170deg, #fffef9 0%, #fffdf5 30%, #fff8e7 100%);
    border: 2px solid #f0d78c;
    border-radius: 28px;
    padding: 44px 40px 38px;
    text-align: center;
    box-shadow:
      0 20px 50px rgba(180, 120, 40, 0.12),
      0 4px 12px rgba(180, 120, 40, 0.08),
      inset 0 0 0 1px rgba(255, 255, 255, 0.6);
    position: relative;
    animation: floatIn 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    opacity: 0;
    overflow: visible;
  }

  @keyframes floatIn {
    0% { opacity: 0; transform: translateY(50px) rotateX(8deg); }
    100% { opacity: 1; transform: translateY(0) rotateX(0deg); }
  }

  /* === 卡片顶部的小角色装饰 === */
  .characters {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: 24px;
    margin-bottom: 8px;
    position: relative;
    z-index: 2;
  }

  /* ---- 角色 emoji ---- */
  .char-emoji {
    font-size: 44px;
    animation: bounce 2s ease-in-out infinite;
    filter: drop-shadow(0 3px 4px rgba(180,140,40,0.25));
  }
  .char-emoji:last-child { animation-delay: 0.3s; }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  /* === 装饰花环 === */
  .garland {
    font-size: 38px;
    letter-spacing: 8px;
    margin-bottom: 8px;
    animation: sway 3s ease-in-out infinite;
  }
  @keyframes sway {
    0%, 100% { transform: rotate(-1.5deg); }
    50% { transform: rotate(1.5deg); }
  }

  .title {
    font-size: 42px;
    font-weight: bold;
    background: linear-gradient(135deg, #d4952b, #e8a840, #c4823a);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin: 12px 0;
    letter-spacing: 4px;
  }

  .subtitle {
    font-size: 15px;
    color: #c4956a;
    letter-spacing: 3px;
    margin-bottom: 18px;
  }

  .divider {
    width: 70px;
    height: 3px;
    background: linear-gradient(90deg, #f5c542, #e8a840, #d4952b);
    margin: 0 auto 22px;
    border-radius: 2px;
  }

  .message {
    font-size: 16px;
    color: #6b5a3e;
    line-height: 2;
    margin-bottom: 28px;
    background: rgba(255, 248, 235, 0.7);
    padding: 16px 12px;
    border-radius: 14px;
  }

  .signature {
    font-size: 14px;
    color: #b8976a;
    font-style: italic;
    letter-spacing: 2px;
    margin-top: 18px;
  }

  /* === 蜡烛 === */
  .candles {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .candle {
    position: relative;
    cursor: pointer;
    transition: transform 0.2s;
  }
  .candle:hover { transform: scale(1.12); }
  .candle-body {
    width: 22px;
    height: 52px;
    border-radius: 7px 7px 0 0;
    position: relative;
    box-shadow: inset -3px 0 8px rgba(0,0,0,0.06);
  }
  .candle-body::after {
    content: '';
    position: absolute;
    top: -2px;
    left: 50%;
    transform: translateX(-50%);
    width: 3px;
    height: 16px;
    background: #5a4a3a;
    border-radius: 2px;
  }
  /* 布丁蜡烛装饰 */
  .candle-emoji {
    position: absolute;
    bottom: -22px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 16px;
    z-index: 5;
  }
  .flame {
    position: absolute;
    top: -30px;
    left: 50%;
    transform: translateX(-50%);
    width: 15px;
    height: 22px;
    background: radial-gradient(ellipse at bottom, #ff8c42, #ffc93c 50%, transparent 70%);
    border-radius: 50% 50% 20% 20%;
    animation: flicker 0.3s ease-in-out infinite alternate;
    filter: blur(0.5px);
    transition: opacity 0.5s, transform 0.5s;
  }
  .candle.blown .flame {
    opacity: 0;
    transform: translateX(-50%) scale(0);
  }
  @keyframes flicker {
    0% { transform: translateX(-50%) rotate(-3deg) scaleY(1); }
    100% { transform: translateX(-50%) rotate(3deg) scaleY(1.12); }
  }

  /* === 提示 === */
  .hint {
    font-size: 13px;
    color: #c4a878;
    margin-top: 20px;
    letter-spacing: 1px;
  }

  /* === 吹蜡烛弹出祝福 === */
  .toast {
    position: fixed;
    z-index: 300;
    pointer-events: none;
    background: rgba(255, 255, 255, 0.92);
    backdrop-filter: blur(8px);
    border: 1px solid #f0d78c;
    border-radius: 16px;
    padding: 14px 24px;
    font-size: 16px;
    color: #6b5a3e;
    text-align: center;
    box-shadow: 0 8px 30px rgba(180, 120, 40, 0.18);
    animation: toastFloat 3.5s ease-out forwards;
    white-space: nowrap;
    letter-spacing: 1px;
  }
  @keyframes toastFloat {
    0% { opacity: 0; transform: translate(-50%, 0) scale(0.8); }
    15% { opacity: 1; transform: translate(-50%, -20px) scale(1); }
    75% { opacity: 1; transform: translate(-50%, -60px) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -100px) scale(0.9); }
  }

  /* === 撒花/彩带 === */
  .confetti {
    position: fixed;
    pointer-events: none;
    z-index: 100;
    animation: fall var(--fall-duration) linear forwards;
  }
  @keyframes fall {
    0% { transform: translateY(-100px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(105vh) rotate(var(--spin)); opacity: 0; }
  }

  /* === 卡片底部装饰 === */
  .bottom-decor {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-top: 18px;
    font-size: 18px;
    opacity: 0.7;
  }

  @media (max-width: 480px) {
    .card { padding: 32px 20px 28px; }
    .title { font-size: 32px; }
    .message { font-size: 14px; }
    .characters { gap: 12px; }
    .char-emoji { font-size: 36px; }
    .candles { gap: 12px; }
  }
</style>
</head>
<body>

<!-- 背景浮动装饰 -->
<div class="bg-pattern" id="bgPattern"></div>

<!-- 卡片 -->
<div class="card-container">
  <div class="card">


    <div class="garland">🍮✨👩‍🍳✨🍮</div>
    <h1 class="title">生日快乐</h1>
    <p class="subtitle">✦ HAPPY BIRTHDAY ✦</p>
    <div class="divider"></div>

    <p class="message" id="message">
      亲爱的女孩<br>
      祝你在新的一岁<br>
      想你所想，爱你所爱<br>
      迎接每一个美好的<br>
      属于你的夏天 ✨
    </p>

    <!-- 蜡烛 -->
    <div class="candles" id="candles"></div>
    <p class="hint">🕯️ 点击蜡烛吹灭它们，许个愿吧！</p>

    <p class="signature">— 你的朋友 ❤️</p>

    <div class="bottom-decor">🍮 👩‍🍳 🍮 👩‍🍳 🍮</div>
  </div>
</div>

<script>
  // === 背景浮动元素：布丁 + 饼干 + 爪子 ===
  const bgPattern = document.getElementById('bgPattern');
  const bgEmojis = ['🍮', '👩‍🍳', '🐾', '🦴', '🧈', '🍯', '⭐', '💛', '🍪', '🧁', '🎀', '🌸', '🍰', '🎵', '🐶', '💝', '🌻', '🍩', '🥐', '🫧'];
  for (let i = 0; i < 40; i++) {
    const el = document.createElement('span');
    el.className = 'bg-float';
    el.textContent = bgEmojis[Math.floor(Math.random() * bgEmojis.length)];
    el.style.cssText = `
      left: ${Math.random() * 90}%;
      top: ${Math.random() * 90}%;
      --dur: ${Math.random() * 4 + 4}s;
      --delay: ${Math.random() * 3}s;
      --size: ${Math.random() * 20 + 16}px;
    `;
    bgPattern.appendChild(el);
  }

  // === 每根蜡烛对应的祝福语（可以自由改成歌词/电影台词） ===
  const candleQuotes = [
    `'Cause we're the masters of our own fate. ——《Lust For Life》 🌷`,
    '身边漫游的过客，都要祝你生日快乐。——《喔伊细》 ✨',
    'birthday-img-1.jpeg',   // ← 第3根蜡烛弹出图片
    'birthday-img-2.jpeg',   // ← 第4根蜡烛弹出图片
    '我的孩子气给我勇气。——《after 17》 🌟',
    `remember a year in the life of friends, remember the love. ——《Seasons of Love》 💫`,
  ];
  const candleCount = 6;
  const candlesContainer = document.getElementById('candles');
  const candleBaseColors = [
    '#fff3cd', '#fef0c8', '#ffe8a1', '#ffe4b5', '#fce083', '#fff9e6'
  ];
  const candleEmojis = ['🍮', '👩‍🍳', '🐾', '🦴', '🧈', '🍯'];
  let blownCount = 0;

  for (let i = 0; i < candleCount; i++) {
    const candle = document.createElement('div');
    candle.className = 'candle';
    candle.innerHTML = `
      <div class="flame"></div>
      <div class="candle-body" style="background: linear-gradient(180deg, ${candleBaseColors[i]} 0%, ${candleBaseColors[i]}dd 100%);"></div>
      <div class="candle-emoji">${candleEmojis[i]}</div>
    `;
    candle._quoteIndex = i;
    candle.addEventListener('click', () => blowCandle(candle));
    candlesContainer.appendChild(candle);
  }

  // === 吹蜡烛 ===
  function blowCandle(candle) {
    if (candle.classList.contains('blown')) return;
    candle.classList.add('blown');
    blownCount++;

    const rect = candle.getBoundingClientRect();
    for (let i = 0; i < 6; i++) {
      spawnSpark(rect.left + rect.width / 2, rect.top);
    }

    // 弹出祝福语
    showToast(candleQuotes[candle._quoteIndex], rect.left + rect.width / 2, rect.top);

    if (blownCount === candleCount) {
      setTimeout(celebrate, 400);
    }
  }

  function showToast(content, x, y) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    const isImage = /\.(jpe?g|png|gif|webp)$/i.test(content);

    if (isImage) {
      const img = document.createElement('img');
      img.src = content;
      img.style.cssText = 'max-width:260px;max-height:200px;border-radius:12px;display:block;';
      toast.appendChild(img);
      toast.style.padding = '10px';
      toast.style.whiteSpace = 'normal';
      toast.style.background = 'rgba(255,255,255,0.95)';
    } else {
      toast.textContent = content;
    }

    toast.style.left = x + 'px';
    toast.style.top = (y - 10) + 'px';
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3600);
  }

  function spawnSpark(x, y) {
    const spark = document.createElement('div');
    const sx = (Math.random() - 0.5) * 60;
    const sy = -(Math.random() * 40 + 20);
    spark.style.cssText = `
      position: fixed; left: ${x}px; top: ${y}px;
      width: 5px; height: 5px;
      background: #f5c542;
      border-radius: 50%;
      pointer-events: none;
      z-index: 200;
      animation: sparkFade 0.6s ease-out forwards;
      --sx: ${sx}px;
      --sy: ${sy}px;
    `;
    document.body.appendChild(spark);
    setTimeout(() => spark.remove(), 600);
  }

  const sparkStyle = document.createElement('style');
  sparkStyle.textContent = `
    @keyframes sparkFade {
      0% { transform: translate(0, 0) scale(1); opacity: 1; }
      100% { transform: translate(var(--sx), var(--sy)) scale(0); opacity: 0; }
    }
  `;
  document.head.appendChild(sparkStyle);

  // === 庆祝 ===
  function celebrate() {
    const colors = ['#f5c542', '#e8a840', '#d4952b', '#ffd93d', '#ff8c42', '#ffe4b5', '#fce083', '#c4956a'];
    const shapes = ['🍮', '👩‍🍳', '🍪', '🧁', '🍰', '🍩', '🐾', '🎀', '💝', '🌸', '🌻', '💛', '⭐', '✨', '🎉', '🎵', '🫧', '🐶', '🥐'];

    for (let i = 0; i < 120; i++) {
      setTimeout(() => {
        const confetti = document.createElement('div');
        confetti.className = 'confetti';
        confetti.textContent = shapes[Math.floor(Math.random() * shapes.length)];
        confetti.style.cssText = `
          left: ${Math.random() * 100}vw;
          top: -30px;
          font-size: ${Math.random() * 22 + 12}px;
          color: ${colors[Math.floor(Math.random() * colors.length)]};
          --fall-duration: ${Math.random() * 2.5 + 2.5}s;
          --spin: ${Math.random() * 720 - 360}deg;
        `;
        document.body.appendChild(confetti);
        setTimeout(() => confetti.remove(), 4000);
      }, i * 28);
    }

    document.getElementById('message').innerHTML = `
      亲爱的女孩，<br>
      蜡烛已吹灭，愿望已启程 🕊️<br>
      祝你在新的一岁，<br>
      想你所想，爱你所爱。<br>
      <strong>生日快乐！🎉</strong>
    `;
    document.querySelector('.hint').textContent = '🎊 愿望一定会实现的！';
  }

  // === 入场撒花 ===
  setTimeout(() => {
    const welcomeShapes = ['🍮', '👩‍🍳', '🍪', '🧁', '🎀', '🌸', '💛', '⭐', '🐾', '🫧'];
    for (let i = 0; i < 25; i++) {
      setTimeout(() => {
        const confetti = document.createElement('div');
        confetti.className = 'confetti';
        confetti.textContent = welcomeShapes[Math.floor(Math.random() * welcomeShapes.length)];
        confetti.style.cssText = `
          left: ${Math.random() * 100}vw;
          top: -20px;
          font-size: ${Math.random() * 14 + 10}px;
          --fall-duration: ${Math.random() * 2 + 2}s;
          --spin: ${Math.random() * 360 - 180}deg;
        `;
        document.body.appendChild(confetti);
        setTimeout(() => confetti.remove(), 3500);
      }, i * 55);
    }
  }, 600);
</script>

</body>
</html>
